<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mitarbeiterprofil</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <div class="logo">OK</div>
        <div>OWASP Mitarbeiterverwaltung</div>
    </div>
    <div class="navlinks">
        <a href="/">Dashboard</a>
        <a href="/employees">Mitarbeiter</a>
    </div>
</nav>

<main class="container">
    <section class="card">
        <span class="badge badge-green">Zugriff erlaubt</span>

        <div class="profile">
            <div class="avatar" th:text="${#strings.substring(employee.firstname,0,1)}">A</div>

            <div>
                <h1 th:text="${employee.firstname + ' ' + employee.lastname}">Mitarbeiter</h1>
                <p>
                    Dieses Profil wurde über die sichere Route geladen.
                    Der Zugriff wurde vorher durch Spring Security geprüft.
                </p>
            </div>
        </div>

        <div class="detail-list">
            <div class="detail-row">
                <strong>ID</strong>
                <span th:text="${employee.id}"></span>
            </div>

            <div class="detail-row">
                <strong>Vorname</strong>
                <span th:text="${employee.firstname}"></span>
            </div>

            <div class="detail-row">
                <strong>Nachname</strong>
                <span th:text="${employee.lastname}"></span>
            </div>

            <div class="detail-row">
                <strong>Abteilung</strong>
                <span th:text="${employee.department}"></span>
            </div>

            <div class="detail-row">
                <strong>E-Mail</strong>
                <span th:text="${employee.email}"></span>
            </div>
        </div>

        <a class="btn" href="/employees">Zurück</a>
    </section>
</main>

</body>
</html>
