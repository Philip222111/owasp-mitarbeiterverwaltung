<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zugriff verweigert</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <div class="logo">403</div>
        <div>OWASP Mitarbeiterverwaltung</div>

        <a href="/employees">Mitarbeiter</a>

        <div class="hero-side">
            <div class="stat-card">
                <div class="stat-number">403</div>
                <div class="stat-label">Access Denied</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">OK</div>
                <div class="stat-label">Autorisierung greift</div>
            </div>
        </div>
